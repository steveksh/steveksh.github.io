<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | Steve Kan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #58a6ff; --text: #e6edf3; --muted: #8b949e; --tag-bg: #1f2937;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    nav ul a:hover, nav ul a.active { color: var(--text); }

    .page { max-width: 720px; margin: 0 auto; padding: 60px 2rem 80px; }
    .page-title { font-size: 2rem; font-weight: 800; margin-bottom: 0.4rem; }
    .page-line { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: 2.5rem; }

    .post-list { display: flex; flex-direction: column; gap: 1.2rem; }
    .post-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.4rem 1.6rem;
      text-decoration: none; display: block;
      transition: border-color 0.2s, transform 0.2s;
    }
    .post-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .post-meta { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.5rem; }
    .post-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
    .post-excerpt { color: var(--muted); font-size: 0.85rem; }
    .post-tag {
      display: inline-block; margin-top: 0.7rem;
      background: var(--tag-bg); border: 1px solid var(--border);
      color: var(--accent); font-size: 0.75rem; padding: 2px 10px; border-radius: 20px;
    }

    .empty { color: var(--muted); font-size: 0.9rem; padding: 2rem 0; }
    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<nav>

  <ul>

    <li><a href="../index.html#experience">Experience</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
    <li><a href="index.html" class="active">Blog</a></li>
  </ul>
</nav>

<div class="page">

  <div class="page-line"></div>

</div>

<footer>© 2026 Steve Kan</footer>
</body>
</html>
