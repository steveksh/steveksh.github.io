<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Title | Steve Kan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #58a6ff; --text: #e6edf3; --muted: #8b949e;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.8; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    nav ul a:hover { color: var(--text); }

    .article { max-width: 680px; margin: 0 auto; padding: 60px 2rem 80px; }
    .back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; margin-bottom: 2rem; transition: color 0.2s; }
    .back:hover { color: var(--accent); }
    .post-tag { display: inline-block; background: #1f2937; border: 1px solid var(--border); color: var(--accent); font-size: 0.75rem; padding: 2px 10px; border-radius: 20px; margin-bottom: 1rem; }
    h1 { font-size: 2rem; font-weight: 800; line-height: 1.3; margin-bottom: 0.6rem; }
    .meta { color: var(--muted); font-size: 0.82rem; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }

    .article h2 { font-size: 1.3rem; font-weight: 700; margin: 2rem 0 0.8rem; }
    .article h3 { font-size: 1.05rem; font-weight: 700; margin: 1.5rem 0 0.6rem; color: var(--accent); }
    .article p { color: #c9d1d9; margin-bottom: 1.2rem; }
    .article ul, .article ol { color: #c9d1d9; margin: 0 0 1.2rem 1.5rem; }
    .article li { margin-bottom: 0.4rem; }
    .article code {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--accent); font-size: 0.85em;
      padding: 2px 6px; border-radius: 4px; font-family: monospace;
    }
    .article pre {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.2rem; overflow-x: auto;
      margin-bottom: 1.2rem;
    }
    .article pre code { background: none; border: none; padding: 0; color: #c9d1d9; font-size: 0.88rem; }
    .article blockquote {
      border-left: 3px solid var(--accent); padding-left: 1rem;
      color: var(--muted); font-style: italic; margin-bottom: 1.2rem;
    }
    .article img { width: 100%; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 1.2rem; }

    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
